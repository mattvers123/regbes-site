<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" href="/favicon.png">
<title>REGBES Time Tracker — Internal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0A1628; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Login screen ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: white; border-radius: 12px; padding: 40px 36px;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .login-logo img { height: 32px; }
  .login-logo span { font-size: 18px; font-weight: 600; color: #0A1628; letter-spacing: 0.04em; }
  .login-title { font-size: 20px; font-weight: 500; color: #0A1628; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: #9ca3af; margin-bottom: 28px; }
  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .login-field input { width: 100%; padding: 11px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #0A1628; outline: none; transition: border-color 0.15s; }
  .login-field input:focus { border-color: #1D9E75; }
  .login-btn { width: 100%; padding: 12px; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  .login-btn:hover { background: #178a64; }
  .login-err { color: #dc2626; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }
  .login-back { text-align: center; margin-top: 20px; }
  .login-back a { font-size: 13px; color: #9ca3af; text-decoration: none; }
  .login-back a:hover { color: #1D9E75; }

  /* ── App shell ── */
  #app-screen { display: none; flex-direction: column; flex: 1; min-height: 100vh; }
  .app-header { background: #0A1628; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .app-header-left { display: flex; align-items: center; gap: 12px; }
  .app-header-left img { height: 28px; }
  .app-header-left span { font-size: 15px; font-weight: 600; color: white; letter-spacing: 0.04em; }
  .app-header-right { display: flex; align-items: center; gap: 16px; }
  .app-user { font-size: 13px; color: rgba(255,255,255,0.55); }
  .logout-btn { font-size: 12px; color: rgba(255,255,255,0.4); background: none; border: 1px solid rgba(255,255,255,0.12); padding: 5px 12px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { color: white; border-color: rgba(255,255,255,0.3); }
  #tracker-frame { flex: 1; border: none; width: 100%; min-height: calc(100vh - 56px); }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="images/regbes-logo-dark.webp" alt="REGBES">
    </div>
    <div class="login-title">Team access</div>
    <div class="login-sub">REGBES internal time tracker — employees only</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="inp-user" placeholder="Your name" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-back"><a href="index.html">← Back to regbes.com</a></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-header-left">
      <img src="images/regbes-logo-light.webp" alt="REGBES">
      <span>Time Tracker</span>
    </div>
    <div class="app-header-right">
      <span class="app-user" id="app-username"></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <iframe id="tracker-frame" src="regbes-tracker-app.html"></iframe>
</div>

<script>
// ── Team credentials — add/remove members here ──────────────────────────
// Format: { username, password, name, id, role }
// role: 'admin' sees all users; 'member' sees own entries only
const TEAM = [
  { username: 'ozhan',    password: 'regbes2024', name: 'Özhan Atmaca',  id: 'u1', role: 'admin'  },
  { username: 'member1',  password: 'tracker01',  name: 'Team Member 1', id: 'u2', role: 'member' },
  { username: 'member2',  password: 'tracker02',  name: 'Team Member 2', id: 'u3', role: 'member' },
];

// ── Data storage — localStorage per user session ─────────────────────────
const STORAGE_KEY = 'regbes_tracker_entries';

function getEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

// ── Auth ──────────────────────────────────────────────────────────────────
let currentMember = null;

function doLogin() {
  const user = document.getElementById('inp-user').value.trim().toLowerCase();
  const pass = document.getElementById('inp-pass').value;
  const err  = document.getElementById('login-err');
  const match = TEAM.find(m => m.username.toLowerCase() === user && m.password === pass);
  if (!match) { err.textContent = 'Incorrect username or password.'; return; }
  err.textContent = '';
  currentMember = match;
  sessionStorage.setItem('regbes_session', JSON.stringify(match));
  showApp(match);
}

function doLogout() {
  currentMember = null;
  sessionStorage.removeItem('regbes_session');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
}

function showApp(member) {
  document.getElementById('app-username').textContent = member.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  // Send member info to iframe once loaded
  const frame = document.getElementById('tracker-frame');
  frame.onload = () => initFrame(member);
  if (frame.contentDocument && frame.contentDocument.readyState === 'complete') initFrame(member);
}

function initFrame(member) {
  document.getElementById('tracker-frame').contentWindow.postMessage(
    { type: 'INIT', member, isAdmin: member.role === 'admin', entries: getEntries() }, '*'
  );
}

// ── Handle messages from iframe ───────────────────────────────────────────
window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'GET_ENTRIES') {
    document.getElementById('tracker-frame').contentWindow.postMessage(
      { type: 'ENTRIES', entries: getEntries() }, '*'
    );
  }
  if (msg.type === 'SAVE_ENTRY') {
    const entries = getEntries();
    entries.push({ ...msg.entry, id: Date.now().toString(), createdAt: new Date().toISOString() });
    saveEntries(entries);
    document.getElementById('tracker-frame').contentWindow.postMessage({ type: 'SAVE_OK' }, '*');
  }
  if (msg.type === 'DELETE_ENTRY') {
    const entries = getEntries().filter(e => e.id !== msg.id);
    saveEntries(entries);
    document.getElementById('tracker-frame').contentWindow.postMessage({ type: 'DELETE_OK' }, '*');
  }
});

// ── Restore session on page reload ───────────────────────────────────────
(function() {
  const session = sessionStorage.getItem('regbes_session');
  if (session) {
    try { currentMember = JSON.parse(session); showApp(currentMember); } catch {}
  }
  // Allow Enter key on login
  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('inp-user').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-pass').focus();
  });
})();
</script>
</body>
</html>

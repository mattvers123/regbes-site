<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<title>REGBES Time Tracker — Internal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0A1628; min-height: 100vh; display: flex; flex-direction: column; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-box { background: white; border-radius: 14px; padding: 44px 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
  .login-logo { margin-bottom: 32px; }
  .login-logo img { height: 30px; width: auto; }
  .login-title { font-size: 22px; font-weight: 600; color: #0A1628; margin-bottom: 6px; letter-spacing: -0.01em; }
  .login-sub { font-size: 13px; color: #9ca3af; margin-bottom: 32px; }
  .login-field { margin-bottom: 18px; }
  .login-field label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .login-field input { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #0A1628; outline: none; transition: border-color 0.15s; background: #fafafa; }
  .login-field input:focus { border-color: #1D9E75; background: white; }
  .login-btn { width: 100%; padding: 13px; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
  .login-btn:hover { background: #178a64; }
  .login-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .login-err { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  .login-back { text-align: center; margin-top: 24px; }
  .login-back a { font-size: 13px; color: #9ca3af; text-decoration: none; }
  .login-back a:hover { color: #1D9E75; }
  #app-screen { display: none; flex-direction: column; flex: 1; min-height: 100vh; }
  .app-header { background: #0A1628; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .app-header-left { display: flex; align-items: center; gap: 14px; }
  .app-header-left img { height: 26px; }
  .app-header-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
  .app-header-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); }
  .app-header-right { display: flex; align-items: center; gap: 16px; }
  .app-user { font-size: 13px; color: rgba(255,255,255,0.5); }
  .app-user strong { color: rgba(255,255,255,0.85); font-weight: 500; }
  .logout-btn { font-size: 12px; color: rgba(255,255,255,0.4); background: none; border: 1px solid rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { color: white; border-color: rgba(255,255,255,0.25); }
  #tracker-frame { flex: 1; border: none; width: 100%; min-height: calc(100vh - 58px); background: #f0f4f8; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><img src="images/regbes-logo-dark.webp" alt="REGBES"></div>
    <div class="login-title">Team access</div>
    <div class="login-sub">REGBES internal time tracker — employees only</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="inp-user" placeholder="Your username" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-back"><a href="index.html">← Back to regbes.com</a></div>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div class="app-header-left">
      <img src="images/regbes-logo-light.webp" alt="REGBES">
      <div class="app-header-divider"></div>
      <div class="app-header-title">Time Tracker</div>
    </div>
    <div class="app-header-right">
      <span class="app-user">Signed in as <strong id="app-username"></strong></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <iframe id="tracker-frame" src="regbes-tracker-app.html"></iframe>
</div>

<script>
// ── Supabase ──────────────────────────────────────────────────────────────
const SB_URL = 'https://zgjuszjthpcbeqlhbsjy.supabase.co';
const SB_KEY = 'sb_publishable_yHZwQfx-9uwWypIIQHWL2Q_58hs6jRW';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ── Team credentials ──────────────────────────────────────────────────────
const TEAM = [
  { username: 'ozhan',   password: 'regbes2024', name: 'Özhan Atmaca',  id: 'u1', role: 'member'  },
  { username: 'mert', password: 'regbes2025',  name: 'Mert Doganli', id: 'u2', role: 'admin' },
  { username: 'member2', password: 'tracker02',  name: 'Team Member 2', id: 'u3', role: 'member' },
];

// ── DB helpers ────────────────────────────────────────────────────────────
async function getEntries() {
  const { data, error } = await sb.from('time_entries').select('*').order('created_at', { ascending: false });
  if (error) throw new Error(error.message);
  return (data || []).map(e => ({
    id: e.id, userId: e.user_id, userName: e.user_name,
    projectId: e.project_id, projectName: e.project_name,
    date: e.date, hours: e.hours, notes: e.notes, createdAt: e.created_at
  }));
}

async function saveEntry(entry) {
  const { error } = await sb.from('time_entries').insert([{
    user_id: entry.userId, user_name: entry.userName,
    project_id: entry.projectId, project_name: entry.projectName,
    date: entry.date, hours: entry.hours, notes: entry.notes || ''
  }]);
  if (error) throw new Error(error.message);
}

async function deleteEntry(id) {
  const { error } = await sb.from('time_entries').delete().eq('id', id);
  if (error) throw new Error(error.message);
}

// ── Auth ──────────────────────────────────────────────────────────────────
let currentMember = null;

async function doLogin() {
  const user = document.getElementById('inp-user').value.trim().toLowerCase();
  const pass = document.getElementById('inp-pass').value;
  const err  = document.getElementById('login-err');
  const btn  = document.getElementById('login-btn');
  const match = TEAM.find(m => m.username.toLowerCase() === user && m.password === pass);
  if (!match) { err.textContent = 'Incorrect username or password.'; return; }
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Connecting…';
  try {
    await getEntries(); // test connection
    currentMember = match;
    sessionStorage.setItem('regbes_session', JSON.stringify(match));
    showApp(match);
  } catch(e) {
    err.textContent = 'Could not connect to database. Please try again.';
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function doLogout() {
  currentMember = null;
  sessionStorage.removeItem('regbes_session');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
}

function showApp(member) {
  document.getElementById('app-username').textContent = member.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  const frame = document.getElementById('tracker-frame');
  const sendInit = async () => {
    const entries = await getEntries();
    frame.contentWindow.postMessage({ type: 'INIT', member, isAdmin: member.role === 'admin', entries }, '*');
  };
  if (frame.contentDocument?.readyState === 'complete') sendInit();
  else frame.onload = sendInit;
}

// ── Messages from iframe ──────────────────────────────────────────────────
window.addEventListener('message', async (e) => {
  const msg = e.data;
  if (!msg?.type) return;
  const frame = document.getElementById('tracker-frame');

  if (msg.type === 'GET_ENTRIES') {
    const entries = await getEntries();
    frame.contentWindow.postMessage({ type: 'ENTRIES', entries }, '*');
  }
  if (msg.type === 'SAVE_ENTRY') {
    try {
      await saveEntry(msg.entry);
      const entries = await getEntries();
      frame.contentWindow.postMessage({ type: 'SAVE_OK', entries }, '*');
    } catch(e) {
      frame.contentWindow.postMessage({ type: 'SAVE_ERR', message: e.message }, '*');
    }
  }
  if (msg.type === 'DELETE_ENTRY') {
    try {
      await deleteEntry(msg.id);
      const entries = await getEntries();
      frame.contentWindow.postMessage({ type: 'DELETE_OK', entries }, '*');
    } catch(e) { console.error(e); }
  }
});

// ── Restore session ───────────────────────────────────────────────────────
(function() {
  const saved = sessionStorage.getItem('regbes_session');
  if (saved) { try { currentMember = JSON.parse(saved); showApp(currentMember); } catch {} }
  document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('inp-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pass').focus(); });
})();
</script>
</body>
</html>
